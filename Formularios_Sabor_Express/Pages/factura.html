<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Factura</title>
    <link rel="stylesheet" href="../assets/css/estilos.css">
</head>
<body>

    <div class="form-container">

        <div class="titulo-logo">
            <img src="../assets/img/logo.png" alt="Logo" class="logo">
            <h2>Registrar Factura</h2>
        </div>

        <form action="guardar_factura.php" method="POST">

            <div class="form-group">
                <label>Número de Factura</label>
                <input type="text" name="numero_factura" required>
            </div>

            <div class="form-group">
                <label>Total</label>
                <input type="number" step="0.01" name="total" required>
            </div>

            <div class="form-group">
                <label>ID Pago</label>
                <input type="number" name="id_pago" required>
            </div>

            <button type="submit" class="btn">Guardar Factura</button>

        </form>

    </div>

</body>
</html>
